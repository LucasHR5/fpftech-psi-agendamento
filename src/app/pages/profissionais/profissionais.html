<div class="min-h-screen bg-zinc-950 text-white">
  
<header class="border-b border-zinc-800 bg-zinc-950">
  <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">

    <h1 class="font-semibold text-lg">
      MindHub
    </h1>

    <nav class="flex gap-6 text-sm text-zinc-400">

      <a routerLink="/profissionais" class="hover:text-white transition">
        Profissionais
      </a>

      <a routerLink="/agendamento" class="hover:text-white transition">
        Horários
      </a>

      <a class="hover:text-white transition cursor-pointer">
        Sobre
      </a>

    </nav>

  </div>
</header>

  <!-- Conteúdo -->
  <main class="flex justify-center p-6">

    <div class="w-full max-w-2xl">

      <h2 class="text-2xl font-bold mb-6 text-center">
        Escolha um profissional
      </h2>

      <!-- Lista -->
      <div class="space-y-4">

        <!-- Card -->
        <div class="bg-zinc-900 hover:bg-zinc-800 transition rounded-xl p-5 flex justify-between items-center shadow-lg">

          <div>
            <h3 class="font-semibold text-lg">Dra. Ana Pereira</h3>
            <p class="text-sm text-zinc-400">Psicóloga Clínica</p>

            <div class="mt-2 text-sm">
              <p>Seg, Qua e Sex</p>
              <p class="text-zinc-400">09:00 • 14:00 • 18:00</p>
            </div>
          </div>

          <button
            (click)="irParaAgendamento()"
            class="bg-indigo-500 hover:bg-indigo-600 text-white text-sm px-4 py-2 rounded-lg font-medium transition">
            Agendar
          </button>

        </div>

        <!-- Card -->
        <div class="bg-zinc-900 hover:bg-zinc-800 transition rounded-xl p-5 flex justify-between items-center shadow-lg">

          <div>
            <h3 class="font-semibold text-lg">Dr. Lucas Martins</h3>
            <p class="text-sm text-zinc-400">Psicólogo Infantil</p>

            <div class="mt-2 text-sm">
              <p>Ter e Qui</p>
              <p class="text-zinc-400">10:00 • 15:00</p>
            </div>
          </div>

          <button
            (click)="irParaAgendamento()"
            class="bg-indigo-500 hover:bg-indigo-600 text-white text-sm px-4 py-2 rounded-lg font-medium transition">
            Agendar
          </button>

        </div>

        <!-- Card -->
        <div class="bg-zinc-900 hover:bg-zinc-800 transition rounded-xl p-5 flex justify-between items-center shadow-lg">

          <div>
            <h3 class="font-semibold text-lg">Dra. Renata Souza</h3>
            <p class="text-sm text-zinc-400">TCC</p>

            <div class="mt-2 text-sm">
              <p>Seg a Sex</p>
              <p class="text-zinc-400">08:00 • 13:00 • 17:00</p>
            </div>
          </div>

          <button
            (click)="irParaAgendamento()"
            class="bg-indigo-500 hover:bg-indigo-600 text-white text-sm px-4 py-2 rounded-lg font-medium transition">
            Agendar
          </button>

        </div>

      </div>

    </div>

  </main>
</div>
