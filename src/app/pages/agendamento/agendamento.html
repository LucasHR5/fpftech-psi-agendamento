<h2 class="title">NOVO AGENDAMENTO</h2>

<div class="form-container">

  <label>Cliente</label>
  <select [(ngModel)]="clienteId" name="cliente">
    <option [ngValue]="null">Selecione</option>
    <option *ngFor="let cliente of clientes" [ngValue]="cliente.id">
      {{ cliente.name }}
    </option>
  </select>

  <label>Disponibilidade</label>
  <select [(ngModel)]="disponibilidadeSelecionada" name="disponibilidade">
    <option [ngValue]="null">Selecione</option>
    <option *ngFor="let disp of disponibilidades" [ngValue]="disp.id">
      {{ disp.day_of_week }} - {{ disp.hour }}
    </option>
  </select>

  <label>Tipo de Consulta</label>
  <select [(ngModel)]="tipoConsulta" name="tipo">
    <option value="online">Online</option>
    <option value="presencial">Presencial</option>
  </select>

  <label>
    <input type="checkbox" [(ngModel)]="confirmado" name="confirmado">
    Confirmado
  </label>

  <button (click)="confirmarAgendamento()">
    Confirmar
  </button>

</div>
